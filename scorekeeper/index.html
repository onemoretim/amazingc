<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2933" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>记分牌</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-bar">
    <button id="btnBack" class="icon-btn" aria-label="返回" hidden>‹</button>
    <h1 id="appTitle">记分牌</h1>
    <button id="btnShare" class="icon-btn" aria-label="分享" hidden>⤴</button>
  </header>

  <main id="app"></main>

  <!-- 通用弹窗 -->
  <div id="modalRoot" class="modal-root" hidden>
    <div class="modal-mask"></div>
    <div class="modal-panel" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modalTitle">提示</h2>
        <button class="icon-btn" id="modalClose" aria-label="关闭">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div id="modalFoot" class="modal-foot"></div>
    </div>
  </div>

  <!-- 轻提示 -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
